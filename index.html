<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366f1">
  <title>WebPOS - Produk</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
  
  <!-- Styles -->
  <link rel="stylesheet" href="../css/style.css">
  
  <style>
    /* Produk Specific Styles */
    .produk-toolbar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .produk-search {
      flex: 1;
      min-width: 250px;
      position: relative;
    }

    .produk-search i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .produk-search input {
      width: 100%;
      padding: 0.875rem 1rem 0.875rem 2.5rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      background: var(--bg-card);
      font-size: 0.875rem;
      transition: all var(--transition-fast);
    }

    .produk-search input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    .produk-filters {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .filter-select {
      padding: 0.875rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      background: var(--bg-card);
      font-size: 0.875rem;
      min-width: 150px;
    }

    .produk-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    @media (max-width: 640px) {
      .produk-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
      }
    }

    .produk-card {
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      border: 1px solid var(--border-color);
      overflow: hidden;
      transition: all var(--transition-base);
      position: relative;
    }

    .produk-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .produk-image {
      aspect-ratio: 1;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .produk-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .produk-image i {
      font-size: 3rem;
      color: var(--text-muted);
    }

    .produk-status {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      padding: 0.25rem 0.75rem;
      border-radius: 50px;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .produk-status.active {
      background: var(--success);
      color: white;
    }

    .produk-status.inactive {
      background: var(--text-muted);
      color: white;
    }

    .produk-stock-badge {
      position: absolute;
      bottom: 0.75rem;
      left: 0.75rem;
      padding: 0.25rem 0.75rem;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      border-radius: var(--radius-md);
      font-size: 0.75rem;
      font-weight: 600;
    }

    .produk-info {
      padding: 1rem;
    }

    .produk-name {
      font-weight: 600;
      font-size: 0.9375rem;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .produk-code {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .produk-price {
      font-weight: 700;
      color: var(--primary);
      font-size: 1rem;
    }

    .produk-actions {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem;
      border-top: 1px solid var(--border-color);
      background: var(--bg-secondary);
    }

    .produk-actions .btn {
      flex: 1;
      padding: 0.5rem;
      font-size: 0.75rem;
    }

    /* Image Upload */
    .image-upload {
      border: 2px dashed var(--border-color);
      border-radius: var(--radius-lg);
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .image-upload:hover {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.05);
    }

    .image-upload i {
      font-size: 2rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .image-preview {
      max-width: 100%;
      max-height: 200px;
      border-radius: var(--radius-md);
      margin-top: 1rem;
    }

    /* Form Row */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    @media (max-width: 640px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    /* Stock Input */
    .stock-input-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .stock-btn {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border-color);
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition-fast);
    }

    .stock-btn:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
    }

    .pagination .btn {
      min-width: 40px;
    }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-secondary) 25%, var(--border-color) 50%, var(--bg-secondary) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-md);
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .produk-card.skeleton {
      height: 280px;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo-container">
          <div class="logo-icon">
            <i class="fas fa-cash-register"></i>
          </div>
          <span class="logo-text">WebPOS</span>
        </div>
      </div>
      
      <button class="menu-toggle" id="menuToggle">
        <i class="fas fa-chevron-left"></i>
      </button>
      
      <div class="sidebar-search">
        <div class="search-input-wrapper">
          <i class="fas fa-search"></i>
          <input type="text" class="search-input" id="menuSearch" placeholder="Cari menu...">
        </div>
      </div>
      
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Utama</div>
          <ul class="nav-menu">
            <li class="nav-item">
              <a href="../index.html" class="nav-link" data-menu="dashboard">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
              </a>
            </li>
            <li class="nav-item">
              <a href="kasir.html" class="nav-link" data-menu="kasir">
                <i class="fas fa-cash-register"></i>
                <span>Kasir</span>
              </a>
            </li>
            <li class="nav-item nav-dropdown open" data-dropdown>
              <div class="nav-link nav-dropdown-toggle active" data-menu="produk">
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                  <i class="fas fa-box"></i>
                  <span>Produk</span>
                </div>
                <i class="fas fa-chevron-down dropdown-arrow"></i>
              </div>
              <ul class="nav-submenu">
                <li><a href="produk.html" class="nav-link active"><span>Daftar Produk</span></a></li>
                <li><a href="kategori.html" class="nav-link"><span>Kategori</span></a></li>
              </ul>
            </li>
          </ul>
        </div>
      </nav>
      
      <div class="sidebar-footer">
        <div class="user-profile" id="userProfile">
          <div class="user-avatar" id="userAvatar">
            <i class="fas fa-user"></i>
          </div>
          <div class="user-info">
            <div class="user-name" id="userName">Loading...</div>
            <div class="user-role" id="userRole">-</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Header -->
      <header class="main-header">
        <div class="header-left">
          <button class="btn-icon d-md-none" id="mobileMenuToggle">
            <i class="fas fa-bars"></i>
          </button>
          <h1 class="header-title">Daftar Produk</h1>
        </div>
        
        <div class="header-actions">
          <button class="btn btn-secondary" id="btnImport">
            <i class="fas fa-file-import"></i>
            <span class="d-none d-md-inline">Import</span>
          </button>
          <button class="btn btn-secondary" id="btnExport">
            <i class="fas fa-file-export"></i>
            <span class="d-none d-md-inline">Export</span>
          </button>
          <button class="btn btn-primary" id="btnAddProduk">
            <i class="fas fa-plus"></i>
            <span class="d-none d-md-inline">Tambah Produk</span>
          </button>
        </div>
      </header>

      <!-- Page Content -->
      <div class="page-content">
        <!-- Toolbar -->
        <div class="produk-toolbar">
          <div class="produk-search">
            <i class="fas fa-search"></i>
            <input type="text" id="searchProduk" placeholder="Cari produk berdasarkan nama atau kode...">
          </div>
          
          <div class="produk-filters">
            <select class="filter-select" id="filterKategori">
              <option value="">Semua Kategori</option>
            </select>
            
            <select class="filter-select" id="filterStatus">
              <option value="">Semua Status</option>
              <option value="active">Aktif</option>
              <option value="inactive">Nonaktif</option>
            </select>
            
            <div class="view-toggle">
              <button class="view-btn active" data-view="grid" title="Grid View">
                <i class="fas fa-th-large"></i>
              </button>
              <button class="view-btn" data-view="list" title="List View">
                <i class="fas fa-list"></i>
              </button>
            </div>
          </div>
        </div>

        <!-- Products Grid -->
        <div class="produk-grid" id="produkGrid">
          <div class="produk-card skeleton" style="height: 280px;"></div>
          <div class="produk-card skeleton" style="height: 280px;"></div>
          <div class="produk-card skeleton" style="height: 280px;"></div>
          <div class="produk-card skeleton" style="height: 280px;"></div>
        </div>

        <!-- Pagination -->

          <!-- Pagination buttons will be inserted here -->
        </div>
      </div>
    </main>

    <!-- Mobile Bottom Nav -->
    <nav class="mobile-nav">
      <a href="../index.html" class="mobile-nav-item">
        <i class="fas fa-home"></i>
        <span>Dashboard</span>
      </a>
      <a href="kasir.html" class="mobile-nav-item">
        <i class="fas fa-cash-register"></i>
        <span>Kasir</span>
      </a>
      <a href="produk.html" class="mobile-nav-item active">
        <i class="fas fa-box"></i>
        <span>Produk</span>
      </a>
      <a href="riwayat.html" class="mobile-nav-item">
        <i class="fas fa-history"></i>
        <span>Riwayat</span>
      </a>
      <a href="setting.html" class="mobile-nav-item">
        <i class="fas fa-cog"></i>
        <span>Setting</span>
      </a>
    </nav>
  </div>

  <!-- Add/Edit Product Modal -->
  <div class="modal-overlay" id="produkModal">
    <div class="modal" style="max-width: 600px;">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Tambah Produk</h3>
        <button class="modal-close" id="closeProdukModal">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="modal-body">
        <form id="produkForm">
          <input type="hidden" id="produkId">
          
          <!-- Image Upload -->
          <div class="form-group">
            <label class="form-label">Gambar Produk</label>
            <div class="image-upload" id="imageUpload">
              <i class="fas fa-cloud-upload-alt"></i>
              <p>Klik untuk upload gambar</p>
              <p style="font-size: 0.75rem; color: var(--text-muted);">atau drag & drop</p>
              <input type="file" id="produkImage" accept="image/*" style="display: none;">
              <img id="imagePreview" class="image-preview" style="display: none;">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label form-label-required">Nama Produk</label>
              <input type="text" class="form-input" id="produkName" required>
            </div>
            <div class="form-group">
              <label class="form-label">Kode Produk</label>
              <input type="text" class="form-input" id="produkCode" placeholder="Auto-generated">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label form-label-required">Kategori</label>
              <select class="form-select" id="produkKategori" required>
                <option value="">Pilih Kategori</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Satuan</label>
              <select class="form-select" id="produkUnit">
                <option value="pcs">Pcs</option>
                <option value="kg">Kg</option>
                <option value="gram">Gram</option>
                <option value="liter">Liter</option>
                <option value="meter">Meter</option>
                <option value="pack">Pack</option>
                <option value="box">Box</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label form-label-required">Harga Modal</label>
              <div class="input-group">
                <span class="input-group-text">Rp</span>
                <input type="number" class="form-input" id="produkCost" required min="0">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label form-label-required">Harga Jual</label>
              <div class="input-group">
                <span class="input-group-text">Rp</span>
                <input type="number" class="form-input" id="produkPrice" required min="0">
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Stok Awal</label>
              <div class="stock-input-group">
                <button type="button" class="stock-btn" onclick="adjustStock(-1)">-</button>
                <input type="number" class="form-input" id="produkStock" value="0" min="0" style="text-align: center;">
                <button type="button" class="stock-btn" onclick="adjustStock(1)">+</button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Stok Minimum</label>
              <input type="number" class="form-input" id="produkMinStock" value="5" min="0">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Deskripsi</label>
            <textarea class="form-textarea" id="produkDesc" rows="3"></textarea>
          </div>

          <div class="form-group">
            <label class="form-check">
              <input type="checkbox" class="form-check-input" id="produkStatus" checked>
              <span class="form-check-label">Produk Aktif</span>
            </label>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="btnCancelProduk">Batal</button>
        <button type="button" class="btn btn-primary" id="btnSaveProduk">
          <i class="fas fa-save"></i>
          Simpan
        </button>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p style="margin-top: 1rem; color: var(--text-secondary);">Loading...</p>
  </div>

  <!-- Scripts -->
  <script src="../js/firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Wait for Firebase auth to be ready
      auth.onAuthStateChanged((user) => {
        if (!user && !Utils.getStorage('webpos_session')) {
          window.location.href = '../login.html';
          return;
        }
        
        // Load user data if available
        if (user) {
          Auth.loadUserData(user.uid);
        }
        
        // Initialize produk
        initProduk();
      });

      function initProduk() {
      // State
      let products = [];
      let categories = [];
      let filteredProducts = [];
      let currentPage = 1;
      let perPage = 12;
      let currentProduct = null;

      // DOM Elements
      const sidebar = document.getElementById('sidebar');
      const menuToggle = document.getElementById('menuToggle');
      const mobileMenuToggle = document.getElementById('mobileMenuToggle');
      const produkModal = document.getElementById('produkModal');

      // Load user data
      function loadUserData() {
        const user = Auth.getCurrentUser();
        if (user) {
          document.getElementById('userName').textContent = user.name || user.email;
          document.getElementById('userRole').textContent = 
            user.role.charAt(0).toUpperCase() + user.role.slice(1);
          
          const avatar = document.getElementById('userAvatar');
          if (avatar && user.name) {
            const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
            avatar.textContent = initials;
          }
        }
      }

      // Toggle sidebar
      menuToggle.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
      });

      // Mobile menu toggle
      mobileMenuToggle.addEventListener('click', () => {
        sidebar.classList.toggle('mobile-open');
      });

      // Dropdown menus
      document.querySelectorAll('[data-dropdown]').forEach(dropdown => {
        const toggle = dropdown.querySelector('.nav-dropdown-toggle');
        if (toggle) {
          toggle.addEventListener('click', (e) => {
            e.preventDefault();
            dropdown.classList.toggle('open');
          });
        }
      });

      // Load categories
      async function loadCategories() {
        try {
          const snapshot = await database.ref('categories').once('value');
          const cats = snapshot.val() || {};
          
          categories = Object.entries(cats).map(([id, data]) => ({ id, ...data }));
          
          const options = categories.map(cat => 
            `<option value="${cat.id}">${cat.name}</option>`
          ).join('');
          
          document.getElementById('filterKategori').innerHTML = 
            '<option value="">Semua Kategori</option>' + options;
          document.getElementById('produkKategori').innerHTML = 
            '<option value="">Pilih Kategori</option>' + options;
        } catch (error) {
          console.error('Error loading categories:', error);
        }
      }

      // Load products
      async function loadProducts() {
        try {
          Utils.showLoading();
          
          const snapshot = await database.ref('products').once('value');
          const prods = snapshot.val() || {};
          
          products = Object.entries(prods).map(([id, data]) => ({ id, ...data }));
          filteredProducts = [...products];
          
          renderProducts();
          renderPagination();
          
          Utils.hideLoading();
        } catch (error) {
          console.error('Error loading products:', error);
          Utils.hideLoading();
          Utils.showToast('Gagal memuat produk', 'error');
        }
      }

      // Render products
      function renderProducts() {
        const container = document.getElementById('produkGrid');
        
        const start = (currentPage - 1) * perPage;
        const end = start + perPage;
        const pageProducts = filteredProducts.slice(start, end);
        
        if (pageProducts.length === 0) {
          container.innerHTML = `
            <div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
              <div class="empty-state">
                <div class="empty-state-icon">
                  <i class="fas fa-box-open"></i>
                </div>
                <p class="empty-state-title">Tidak ada produk</p>
                <p class="empty-state-text">Belum ada produk yang ditambahkan</p>
              </div>
            </div>
          `;
          return;
        }
        
        container.innerHTML = pageProducts.map(product => {
          const category = categories.find(c => c.id === product.categoryId);
          const statusClass = product.status === 'active' ? 'active' : 'inactive';
          const statusText = product.status === 'active' ? 'Aktif' : 'Nonaktif';
          
          return `
            <div class="produk-card" data-id="${product.id}">
              <div class="produk-image">
                ${product.image ? 
                  `<img src="${product.image}" alt="${product.name}">` : 
                  '<i class="fas fa-box"></i>'
                }
                <span class="produk-status ${statusClass}">${statusText}</span>
                <span class="produk-stock-badge">Stok: ${product.stock || 0}</span>
              </div>
              <div class="produk-info">
                <div class="produk-name">${product.name}</div>
                <div class="produk-code">${product.code || '-'} • ${category?.name || 'Uncategorized'}</div>
                <div class="produk-price">${Utils.formatRupiah(product.sellingPrice)}</div>
              </div>
              <div class="produk-actions">
                <button class="btn btn-secondary btn-sm" onclick="editProduct('${product.id}')">
                  <i class="fas fa-edit"></i> Edit
                </button>
                <button class="btn btn-danger btn-sm" onclick="deleteProduct('${product.id}')">
                  <i class="fas fa-trash"></i> Hapus
                </button>
              </div>
            </div>
          `;
        }).join('');
      }

      // Render pagination
      function renderPagination() {
        const totalPages = Math.ceil(filteredProducts.length / perPage);
        const container = document.getElementById('pagination');
        
        if (totalPages <= 1) {
          container.innerHTML = '';
          return;
        }
        
        let html = '';
        
        // Previous
        html += `
          <button class="btn btn-sm btn-secondary" 
            ${currentPage === 1 ? 'disabled' : ''}
            onclick="goToPage(${currentPage - 1})">
            <i class="fas fa-chevron-left"></i>
          </button>
        `;
        
        // Page numbers
        for (let i = 1; i <= totalPages; i++) {
          if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
            html += `
              <button class="btn btn-sm ${i === currentPage ? 'btn-primary' : 'btn-secondary'}"
                onclick="goToPage(${i})">
                ${i}
              </button>
            `;
          } else if (i === currentPage - 2 || i === currentPage + 2) {
            html += `<span class="btn btn-sm btn-ghost">...</span>`;
          }
        }
        
        // Next
        html += `
          <button class="btn btn-sm btn-secondary"
            ${currentPage === totalPages ? 'disabled' : ''}
            onclick="goToPage(${currentPage + 1})">
            <i class="fas fa-chevron-right"></i>
          </button>
        `;
        
        container.innerHTML = html;
      }

      // Go to page (global function)
      window.goToPage = (page) => {
        currentPage = page;
        renderProducts();
        renderPagination();
      };

      // Apply filters
      function applyFilters() {
        const search = document.getElementById('searchProduk').value.toLowerCase();
        const category = document.getElementById('filterKategori').value;
        const status = document.getElementById('filterStatus').value;
        
        filteredProducts = products.filter(p => {
          const matchSearch = !search || 
            p.name.toLowerCase().includes(search) ||
            (p.code && p.code.toLowerCase().includes(search));
          const matchCategory = !category || p.categoryId === category;
          const matchStatus = !status || p.status === status;
          
          return matchSearch && matchCategory && matchStatus;
        });
        
        currentPage = 1;
        renderProducts();
        renderPagination();
      }

      // Filter event listeners
      document.getElementById('searchProduk').addEventListener('input', 
        Utils.debounce(applyFilters, 300)
      );
      document.getElementById('filterKategori').addEventListener('change', applyFilters);
      document.getElementById('filterStatus').addEventListener('change', applyFilters);

      // Add product
      document.getElementById('btnAddProduk').addEventListener('click', () => {
        currentProduct = null;
        document.getElementById('modalTitle').textContent = 'Tambah Produk';
        document.getElementById('produkForm').reset();
        document.getElementById('produkId').value = '';
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('produkCode').value = generateProductCode();
        produkModal.classList.add('active');
      });

      // Edit product (global function)
      window.editProduct = (productId) => {
        const product = products.find(p => p.id === productId);
        if (!product) return;
        
        currentProduct = product;
        document.getElementById('modalTitle').textContent = 'Edit Produk';
        document.getElementById('produkId').value = product.id;
        document.getElementById('produkName').value = product.name;
        document.getElementById('produkCode').value = product.code || '';
        document.getElementById('produkKategori').value = product.categoryId || '';
        document.getElementById('produkUnit').value = product.unit || 'pcs';
        document.getElementById('produkCost').value = product.costPrice || 0;
        document.getElementById('produkPrice').value = product.sellingPrice || 0;
        document.getElementById('produkStock').value = product.stock || 0;
        document.getElementById('produkMinStock').value = product.minStock || 5;
        document.getElementById('produkDesc').value = product.description || '';
        document.getElementById('produkStatus').checked = product.status !== 'inactive';
        
        if (product.image) {
          document.getElementById('imagePreview').src = product.image;
          document.getElementById('imagePreview').style.display = 'block';
        } else {
          document.getElementById('imagePreview').style.display = 'none';
        }
        
        produkModal.classList.add('active');
      };

      // Delete product (global function)
      window.deleteProduct = async (productId) => {
        Utils.confirm('Yakin ingin menghapus produk ini?', async () => {
          try {
            Utils.showLoading('Menghapus produk...');
            await database.ref(`products/${productId}`).remove();
            
            products = products.filter(p => p.id !== productId);
            applyFilters();
            
            Utils.hideLoading();
            Utils.showToast('Produk berhasil dihapus', 'success');
          } catch (error) {
            Utils.hideLoading();
            Utils.showToast('Gagal menghapus produk', 'error');
          }
        });
      };

      // Adjust stock (global function)
      window.adjustStock = (delta) => {
        const input = document.getElementById('produkStock');
        const current = parseInt(input.value) || 0;
        input.value = Math.max(0, current + delta);
      };

      // Generate product code
      function generateProductCode() {
        const prefix = 'PRD';
        const random = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
        return `${prefix}${Date.now().toString().slice(-4)}${random}`;
      }

      // Image upload
      const imageUpload = document.getElementById('imageUpload');
      const produkImage = document.getElementById('produkImage');
      
      imageUpload.addEventListener('click', () => produkImage.click());
      
      imageUpload.addEventListener('dragover', (e) => {
        e.preventDefault();
        imageUpload.style.borderColor = 'var(--primary)';
      });
      
      imageUpload.addEventListener('dragleave', () => {
        imageUpload.style.borderColor = 'var(--border-color)';
      });
      
      imageUpload.addEventListener('drop', (e) => {
        e.preventDefault();
        imageUpload.style.borderColor = 'var(--border-color)';
        if (e.dataTransfer.files.length) {
          handleImageSelect(e.dataTransfer.files[0]);
        }
      });
      
      produkImage.addEventListener('change', (e) => {
        if (e.target.files.length) {
          handleImageSelect(e.target.files[0]);
        }
      });

      function handleImageSelect(file) {
        if (!file.type.startsWith('image/')) {
          Utils.showToast('File harus berupa gambar', 'error');
          return;
        }
        
        const reader = new FileReader();
        reader.onload = (e) => {
          const preview = document.getElementById('imagePreview');
          preview.src = e.target.result;
          preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      }

      // Close modal
      document.getElementById('closeProdukModal').addEventListener('click', () => {
        produkModal.classList.remove('active');
      });

      document.getElementById('btnCancelProduk').addEventListener('click', () => {
        produkModal.classList.remove('active');
      });

      // Save product
      document.getElementById('btnSaveProduk').addEventListener('click', async () => {
        const form = document.getElementById('produkForm');
        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }
        
        try {
          Utils.showLoading('Menyimpan produk...');
          
          const productData = {
            name: document.getElementById('produkName').value,
            code: document.getElementById('produkCode').value,
            categoryId: document.getElementById('produkKategori').value,
            unit: document.getElementById('produkUnit').value,
            costPrice: parseInt(document.getElementById('produkCost').value) || 0,
            sellingPrice: parseInt(document.getElementById('produkPrice').value) || 0,
            stock: parseInt(document.getElementById('produkStock').value) || 0,
            minStock: parseInt(document.getElementById('produkMinStock').value) || 5,
            description: document.getElementById('produkDesc').value,
            status: document.getElementById('produkStatus').checked ? 'active' : 'inactive',
            updatedAt: firebase.database.ServerValue.TIMESTAMP
          };
          
          // Handle image upload
          const imagePreview = document.getElementById('imagePreview');
          if (imagePreview.style.display !== 'none' && imagePreview.src.startsWith('data:')) {
            const imageFile = await fetch(imagePreview.src).then(r => r.blob());
            const imageRef = storage.ref(`products/${Date.now()}_${productData.name}`);
            await imageRef.put(imageFile);
            productData.image = await imageRef.getDownloadURL();
          } else if (currentProduct?.image) {
            productData.image = currentProduct.image;
          }
          
          const productId = document.getElementById('produkId').value;
          
          if (productId) {
            // Update existing
            await database.ref(`products/${productId}`).update(productData);
            Utils.showToast('Produk berhasil diupdate', 'success');
          } else {
            // Create new
            const newId = Utils.generateId('PRD');
            productData.id = newId;
            productData.createdAt = firebase.database.ServerValue.TIMESTAMP;
            productData.soldCount = 0;
            
            await database.ref(`products/${newId}`).set(productData);
            Utils.showToast('Produk berhasil ditambahkan', 'success');
          }
          
          produkModal.classList.remove('active');
          loadProducts();
          
        } catch (error) {
          console.error('Error saving product:', error);
          Utils.hideLoading();
          Utils.showToast('Gagal menyimpan produk', 'error');
        }
      });

      // Export products
      document.getElementById('btnExport').addEventListener('click', () => {
        const data = products.map(p => ({
          ID: p.id,
          Nama: p.name,
          Kode: p.code,
          Kategori: categories.find(c => c.id === p.categoryId)?.name || '',
          'Harga Modal': p.costPrice,
          'Harga Jual': p.sellingPrice,
          Stok: p.stock,
          Satuan: p.unit,
          Status: p.status
        }));
        
        // Convert to CSV
        const headers = Object.keys(data[0]);
        const csv = [
          headers.join(','),
          ...data.map(row => headers.map(h => row[h]).join(','))
        ].join('\n');
        
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `produk_${Utils.getTodayString()}.csv`;
        a.click();
        window.URL.revokeObjectURL(url);
        
        Utils.showToast('Produk berhasil diexport', 'success');
      });

      // Import products
      document.getElementById('btnImport').addEventListener('click', () => {
        Utils.showToast('Fitur import akan segera tersedia', 'info');
      });

      // Initialize
      loadUserData();
      loadCategories();
      loadProducts();
      }
    });
  </script>
</body>
</html>
