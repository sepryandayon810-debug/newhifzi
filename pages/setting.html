<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6366f1">
  <title>WebPOS - Set Modal</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  
  <link rel="stylesheet" href="../css/style.css">
  
  <style>
    .modal-card {
      max-width: 500px;
      margin: 0 auto;
    }

    .modal-amount {
      font-size: 3rem;
      font-weight: 700;
      color: var(--primary);
      text-align: center;
      padding: 2rem;
      background: var(--bg-secondary);
      border-radius: var(--radius-xl);
      margin-bottom: 1.5rem;
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .numpad-btn {
      padding: 1.5rem;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      font-size: 1.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .numpad-btn:hover {
      background: var(--bg-secondary);
    }

    .numpad-btn.action {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .quick-amounts {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .quick-amount {
      padding: 0.5rem 1rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 50px;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all var(--transition-fast);
    }

    .quick-amount:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .modal-info {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: var(--radius-lg);
      padding: 1rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--info);
    }

    .modal-info i {
      font-size: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo-container">
          <div class="logo-icon"><i class="fas fa-cash-register"></i></div>
          <span class="logo-text">WebPOS</span>
        </div>
      </div>
      <button class="menu-toggle" id="menuToggle"><i class="fas fa-chevron-left"></i></button>
      <div class="sidebar-search">
        <div class="search-input-wrapper">
          <i class="fas fa-search"></i>
          <input type="text" class="search-input" placeholder="Cari menu...">
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Utama</div>
          <ul class="nav-menu">
            <li class="nav-item"><a href="../index.html" class="nav-link"><i class="fas fa-home"></i><span>Dashboard</span></a></li>
            <li class="nav-item"><a href="kasir.html" class="nav-link"><i class="fas fa-cash-register"></i><span>Kasir</span></a></li>
            <li class="nav-item nav-dropdown" data-dropdown>
              <div class="nav-link nav-dropdown-toggle"><div style="display:flex;align-items:center;gap:0.75rem;"><i class="fas fa-box"></i><span>Produk</span></div><i class="fas fa-chevron-down dropdown-arrow"></i></div>
              <ul class="nav-submenu">
                <li><a href="produk.html" class="nav-link"><span>Daftar Produk</span></a></li>
                <li><a href="kategori.html" class="nav-link"><span>Kategori</span></a></li>
              </ul>
            </li>
          </ul>
        </div>
        <div class="nav-section">
          <div class="nav-section-title">Transaksi</div>
          <ul class="nav-menu">
            <li class="nav-item"><a href="riwayat.html" class="nav-link"><i class="fas fa-history"></i><span>Riwayat Transaksi</span></a></li>
            <li class="nav-item"><a href="kas.html" class="nav-link"><i class="fas fa-wallet"></i><span>Kas Management</span></a></li>
          </ul>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-profile" id="userProfile">
          <div class="user-avatar" id="userAvatar"><i class="fas fa-user"></i></div>
          <div class="user-info">
            <div class="user-name" id="userName">Loading...</div>
            <div class="user-role" id="userRole">-</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="main-header">
        <div class="header-left">
          <button class="btn-icon d-md-none" id="mobileMenuToggle"><i class="fas fa-bars"></i></button>
          <h1 class="header-title">Set Modal Awal</h1>
        </div>
        <div class="header-actions">
          <button class="btn-icon" id="btnLogout"><i class="fas fa-sign-out-alt"></i></button>
        </div>
      </header>

      <div class="page-content">
        <div class="modal-card">
          <div class="card">
            <div class="card-header">
              <h3 class="card-title"><i class="fas fa-coins"></i> Modal Awal Hari Ini</h3>
            </div>
            <div class="card-body">
              <div class="modal-info">
                <i class="fas fa-info-circle"></i>
                <span>Masukkan jumlah uang tunai yang ada di kasir saat ini.</span>
              </div>

              <div class="modal-amount" id="modalAmount">Rp 0</div>

              <div class="quick-amounts">
                <button class="quick-amount" data-amount="500000">500.000</button>
                <button class="quick-amount" data-amount="1000000">1.000.000</button>
                <button class="quick-amount" data-amount="2000000">2.000.000</button>
                <button class="quick-amount" data-amount="5000000">5.000.000</button>
              </div>

              <div class="numpad">
                <button class="numpad-btn" data-num="1">1</button>
                <button class="numpad-btn" data-num="2">2</button>
                <button class="numpad-btn" data-num="3">3</button>
                <button class="numpad-btn" data-num="4">4</button>
                <button class="numpad-btn" data-num="5">5</button>
                <button class="numpad-btn" data-num="6">6</button>
                <button class="numpad-btn" data-num="7">7</button>
                <button class="numpad-btn" data-num="8">8</button>
                <button class="numpad-btn" data-num="9">9</button>
                <button class="numpad-btn action" data-action="clear">C</button>
                <button class="numpad-btn" data-num="0">0</button>
                <button class="numpad-btn action" data-action="backspace"><i class="fas fa-backspace"></i></button>
              </div>

              <button class="btn btn-primary btn-block btn-lg" id="btnSimpanModal">
                <i class="fas fa-save"></i>
                Simpan Modal
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <nav class="mobile-nav">
      <a href="../index.html" class="mobile-nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
      <a href="kasir.html" class="mobile-nav-item"><i class="fas fa-cash-register"></i><span>Kasir</span></a>
      <a href="produk.html" class="mobile-nav-item"><i class="fas fa-box"></i><span>Produk</span></a>
      <a href="riwayat.html" class="mobile-nav-item"><i class="fas fa-history"></i><span>Riwayat</span></a>
      <a href="setting.html" class="mobile-nav-item"><i class="fas fa-cog"></i><span>Setting</span></a>
    </nav>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p style="margin-top: 1rem; color: var(--text-secondary);">Loading...</p>
  </div>

  <script src="../js/firebase-config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Wait for Firebase auth to be ready
      auth.onAuthStateChanged((user) => {
        if (!user && !Utils.getStorage('webpos_session')) {
          window.location.href = '../login.html';
          return;
        }
        
        // Load user data if available
        if (user) {
          Auth.loadUserData(user.uid);
        }
        
        // Initialize modal
        initModal();
      });

      function initModal() {
      const user = Auth.getCurrentUser();
      document.getElementById('userName').textContent = user?.name || user?.email || 'User';
      document.getElementById('userRole').textContent = user?.role ? user.role.charAt(0).toUpperCase() + user.role.slice(1) : 'Kasir';

      let amount = 0;

      // Sidebar toggle
      document.getElementById('menuToggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('collapsed');
      });

      document.getElementById('mobileMenuToggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('mobile-open');
      });

      document.getElementById('btnLogout').addEventListener('click', () => {
        Utils.confirm('Yakin ingin logout?', () => Auth.logout());
      });

      // Update display
      function updateDisplay() {
        document.getElementById('modalAmount').textContent = Utils.formatRupiah(amount);
      }

      // Numpad
      document.querySelectorAll('.numpad-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const num = btn.dataset.num;
          const action = btn.dataset.action;
          
          if (num !== undefined) {
            amount = amount * 10 + parseInt(num);
          } else if (action === 'clear') {
            amount = 0;
          } else if (action === 'backspace') {
            amount = Math.floor(amount / 10);
          }
          
          updateDisplay();
        });
      });

      // Quick amounts
      document.querySelectorAll('.quick-amount').forEach(btn => {
        btn.addEventListener('click', () => {
          amount = parseInt(btn.dataset.amount);
          updateDisplay();
        });
      });

      // Load existing modal
      async function loadModal() {
        try {
          const today = Utils.getTodayString();
          const snapshot = await database.ref(`modal/${today}/${user.uid}`).once('value');
          const modal = snapshot.val();
          
          if (modal && modal.amount) {
            amount = modal.amount;
            updateDisplay();
          }
        } catch (error) {
          console.error('Error loading modal:', error);
        }
      }

      // Save modal
      document.getElementById('btnSimpanModal').addEventListener('click', async () => {
        if (amount <= 0) {
          Utils.showToast('Masukkan jumlah modal terlebih dahulu', 'warning');
          return;
        }

        try {
          Utils.showLoading('Menyimpan modal...');
          
          const today = Utils.getTodayString();
          await database.ref(`modal/${today}/${user.uid}`).set({
            amount: amount,
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            userId: user.uid,
            userName: user.name
          });
          
          Utils.hideLoading();
          Utils.showToast('Modal berhasil disimpan!', 'success');
          
          setTimeout(() => {
            window.location.href = '../index.html';
          }, 1500);
          
        } catch (error) {
          Utils.hideLoading();
          Utils.showToast('Gagal menyimpan modal', 'error');
        }
      });

      loadModal();
      }
    });
  </script>
</body>
</html>
